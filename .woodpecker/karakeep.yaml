# Karakeep fork image.
# Pushes the all-in-one runtime to: ghcr.io/sm-moshi/karakeep
when:
  - event: manual
  - event: push
    branch: main

steps:
  - name: build-and-push-ghcr
    image: gcr.io/kaniko-project/executor:v1.24.0-debug@sha256:c6d6ff561634f9338e7f9734a5b8c5ddf1ccfe3326124f54f899bff70d2dc4d5
    environment:
      GHCR_TOKEN:
        from_secret: github_token
    commands:
      - mkdir -p /kaniko/.docker
      - printf '{"auths":{"ghcr.io":{"username":"sm-moshi","password":"%s"}}}\n' "$${GHCR_TOKEN}" > /kaniko/.docker/config.json
      - >-
        /kaniko/executor
        --context "$${CI_WORKSPACE}"
        --dockerfile "$${CI_WORKSPACE}/docker/Dockerfile"
        --target aio
        --build-arg SERVER_VERSION="$${CI_COMMIT_SHA}"
        --destination ghcr.io/sm-moshi/karakeep:$${CI_COMMIT_SHA:0:8}
        --destination ghcr.io/sm-moshi/karakeep:latest
        --snapshot-mode=redo

  - name: trivy-scan
    failure: ignore
    image: dhi.io/trivy:0.70.0-alpine3.23-dev@sha256:f9bf79b3412bf459cd68434f7c5f99bc9f905ecfddd5e98972368557be40f7aa
    environment:
      IMAGE_REF: ghcr.io/sm-moshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}

  - name: sbom-generate
    failure: ignore
    image: dhi.io/syft:1.44.0-alpine3.23-dev@sha256:5827400e1f8401e8b925687aa38624ada774b5480153ddbe342815a68559b8ef
    environment:
      IMAGE_REF: ghcr.io/sm-moshi/karakeep:${CI_COMMIT_SHA:0:8}
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > sbom.spdx.json
