# Optional PgBouncer pooler for application traffic.
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: karakeep-postgres-rw
spec:
  cluster:
    name: karakeep-postgres
  instances: 2
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: "200"
      default_pool_size: "20"
