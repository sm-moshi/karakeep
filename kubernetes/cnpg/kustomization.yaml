apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: karakeep

secretGenerator:
  - envs:
      - .secrets
    name: karakeep-secrets

configMapGenerator:
  - envs:
      - .env
    name: karakeep-configuration

resources:
  - namespace.yaml
  - postgres-cluster.yaml
  - karakeep-deployment.yaml
  - karakeep-service.yaml
  - chrome-deployment.yaml
  - chrome-service.yaml
  - meilisearch-deployment.yaml
  - meilisearch-service.yaml
  - meilisearch-pvc.yaml
  - data-pvc.yaml

replacements:
  - source:
      fieldPath: data.KARAKEEP_IMAGE
      kind: ConfigMap
      name: karakeep-configuration
      version: v1
    targets:
      - fieldPaths:
          - spec.template.spec.containers.0.image
        options:
          delimiter: ":"
          index: 0
        select:
          group: apps
          kind: Deployment
          name: karakeep
          version: v1
  - source:
      fieldPath: data.KARAKEEP_VERSION
      kind: ConfigMap
      name: karakeep-configuration
      version: v1
    targets:
      - fieldPaths:
          - spec.template.spec.containers.0.image
        options:
          delimiter: ":"
          index: 1
        select:
          group: apps
          kind: Deployment
          name: karakeep
          version: v1
